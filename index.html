<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Scoring data ────────────────────────────────────────────────────────────
const CRITERIA = {
  houseType: {
    label: "House Type", icon: "🏘️",
    options: [
      { label: "Select…",         value: null  },
      { label: "Bungalow",        value: 10    },
      { label: "Single Family",   value: 8     },
      { label: "Split Level",     value: 5     },
      { label: "Semi-attached",   value: -5    },
    ],
  },
  location: {
    label: "Location", icon: "📍",
    options: [
      { label: "Select…",             value: null },
      { label: "Dartmouth Lancaster",  value: 10   },
      { label: "Halifax West",         value: 8    },
      { label: "Dartmouth North",      value: 8    },
      { label: "Dartmouth Downtown",   value: 6    },
      { label: "Halifax North",        value: 5    },
      { label: "Halifax",              value: 3    },
    ],
  },
  orientation: {
    label: "Orientation", icon: "🧭",
    options: [
      { label: "Select…",       value: null },
      { label: "South-facing",  value: 10   },
      { label: "East-facing",   value: 5    },
      { label: "West-facing",   value: 5    },
      { label: "North-facing",  value: -5   },
    ],
  },
  power: {
    label: "Power Source", icon: "⚡",
    options: [
      { label: "Select…",                    value: null },
      { label: "Dual: Electricity & Propane", value: 10  },
      { label: "Dual: Electricity & Oil",     value: 7   },
      { label: "Oil only",                    value: 5   },
      { label: "Solely Electricity",          value: 0   },
    ],
  },
  heating: {
    label: "Heating", icon: "🔥",
    options: [
      { label: "Select…",                        value: null },
      { label: "Electricity + Propane Fireplace", value: 10  },
      { label: "Electricity + Heat Pump",         value: 7   },
      { label: "Electricity only",                value: 0   },
    ],
  },
  driveway: {
    label: "Driveway", icon: "🚗",
    options: [
      { label: "Select…", value: null },
      { label: "Paved",    value: 10  },
      { label: "Pavers",   value: 7   },
      { label: "Gravelled",value: 5   },
    ],
  },
  garage: {
    label: "Garage", icon: "🏠",
    options: [
      { label: "Select…",        value: null },
      { label: "Double Attached", value: 10  },
      { label: "Double",          value: 8   },
      { label: "Single Attached", value: 5   },
      { label: "Single",          value: 3   },
    ],
  },
  fence: {
    label: "Fence", icon: "🌿",
    options: [
      { label: "Select…",   value: null },
      { label: "Wood Fence", value: 7   },
      { label: "Chain Link", value: 3   },
      { label: "No Fence",   value: -5  },
    ],
  },
  roof: {
    label: "Roof Last Updated", icon: "🏗️",
    options: [
      { label: "Select…",        value: null },
      { label: "Within 1 year",   value: 10  },
      { label: "Within 5 years",  value: 7   },
      { label: "Within 8 years",  value: 5   },
      { label: "Around 10 years", value: 1   },
    ],
  },
  fireplace: {
    label: "Fireplace", icon: "🕯️",
    options: [
      { label: "Select…",        value: null },
      { label: "Propane Fireplace",value: 5  },
      { label: "Conventional",    value: 3   },
      { label: "Electric",        value: 3   },
      { label: "None",            value: -5  },
    ],
  },
};

const BASE_PRICE = 580000;
const MAX_SCORE  = 92;   // includes new houseType max (10)
const MIN_SCORE  = -20;

// ── Quarterly trendline data (HRM, 2023 Q1 – 2025 Q4) ───────────────────────
// Sources: NSAR, RE/MAX, Perkins Real Estate, cbmaritimerealty.com
const QUARTERS = ["Q1'23","Q2'23","Q3'23","Q4'23","Q1'24","Q2'24","Q3'24","Q4'24","Q1'25","Q2'25","Q3'25","Q4'25"];
const TREND_DATA = {
  "Single Family": [542000,575000,560000,548000,565000,607000,583000,606000,612000,620000,628000,633000],
  "Bungalow":      [510000,538000,525000,515000,530000,568000,546000,568000,575000,582000,589000,594000],
  "Split Level":   [490000,518000,505000,496000,512000,548000,527000,548000,555000,562000,569000,574000],
  "Semi-attached": [445000,472000,460000,451000,465000,498000,479000,498000,504000,511000,518000,522000],
};
const TREND_COLORS = {
  "Single Family": "#00e5ff",
  "Bungalow":      "#39ff14",
  "Split Level":   "#ff9f0a",
  "Semi-attached": "#bf5af2",
};

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtCAD(n) {
  return "$" + Math.round(n).toLocaleString("en-CA");
}
function getColor(pct) {
  if (pct >= 80) return "#39ff14";
  if (pct >= 60) return "#00e5ff";
  if (pct >= 40) return "#ff9f0a";
  return "#ff453a";
}
function getLabel(pct, answered, total) {
  if (answered < total) return `${answered} of ${total} answered`;
  if (pct >= 80) return "Excellent Match ✦";
  if (pct >= 60) return "Good Match";
  if (pct >= 40) return "Fair Match";
  return "Below Average";
}

// ── Trendline chart ───────────────────────────────────────────────────────────
function TrendChart() {
  const ref = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();

    chartRef.current = new Chart(ref.current, {
      type: "line",
      data: {
        labels: QUARTERS,
        datasets: Object.entries(TREND_DATA).map(([label, data]) => ({
          label,
          data,
          borderColor: TREND_COLORS[label],
          backgroundColor: TREND_COLORS[label] + "18",
          borderWidth: 2.5,
          pointRadius: 3,
          pointHoverRadius: 6,
          tension: 0.35,
          fill: false,
        })),
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: {
            position: "bottom",
            labels: {
              color: "#7a96b0",
              font: { family: "Space Grotesk", size: 10 },
              boxWidth: 10,
              padding: 10,
            },
          },
          tooltip: {
            backgroundColor: "#0d1c2b",
            borderColor: "#1c2d3e",
            borderWidth: 1,
            titleColor: "#00e5ff",
            bodyColor: "#e8edf3",
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: ${fmtCAD(ctx.raw)}`,
            },
          },
        },
        scales: {
          x: {
            grid: { color: "#1c2d3e" },
            ticks: { color: "#3a5068", font: { family: "Space Grotesk", size: 9 } },
          },
          y: {
            grid: { color: "#1c2d3e" },
            ticks: {
              color: "#3a5068",
              font: { family: "Space Grotesk", size: 9 },
              callback: v => "$" + (v/1000).toFixed(0) + "K",
            },
            min: 400000,
            max: 700000,
          },
        },
      },
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, []);

  return (
    <div style={{ height: 220 }}>
      <canvas ref={ref} />
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [address,   setAddress]   = useState("");
  const [listPrice, setListPrice] = useState("");
  const [scores,    setScores]    = useState({});
  const [saved,     setSaved]     = useState([]);
  const [tab,       setTab]       = useState("score"); // "score" | "trend"
  const [showSrc,   setShowSrc]   = useState(false);

  const totalScore = Object.values(scores).reduce((s, v) => s + v, 0);
  const answered   = Object.keys(scores).length;
  const total      = Object.keys(CRITERIA).length;

  const norm     = Math.max(0, Math.min(1, (totalScore - MIN_SCORE) / (MAX_SCORE - MIN_SCORE)));
  const offerPct = 0.83 + norm * 0.19;
  const pct      = norm * 100;
  const color    = getColor(pct);

  const entered       = parseFloat((listPrice || "").replace(/[,$]/g, "")) || null;
  const baseOffer     = Math.round((BASE_PRICE * offerPct) / 1000) * 1000;
  const adjOffer      = entered ? Math.round((entered * offerPct) / 1000) * 1000 : null;
  const displayOffer  = adjOffer || baseOffer;

  const circ = 2 * Math.PI * 52;
  const dash = (Math.min(100, pct) / 100) * circ;

  function handleChange(key, rawVal) {
    const val = rawVal === "null" ? null : Number(rawVal);
    if (val === null) {
      setScores(p => { const n = {...p}; delete n[key]; return n; });
    } else {
      setScores(p => ({ ...p, [key]: val }));
    }
  }

  function handleSave() {
    if (!address) return;
    setSaved(prev => [{
      address, score: totalScore, pct: Math.round(pct),
      offer: displayOffer, list: entered,
      label: getLabel(pct, answered, total),
      color, date: new Date().toLocaleDateString("en-CA"),
    }, ...prev]);
    setAddress(""); setListPrice(""); setScores({});
  }

  return (
    <div>
      {/* ── HEADER ── */}
      <header style={{
        background: "linear-gradient(135deg, #0d1c2b 0%, #080f17 100%)",
        borderBottom: "1px solid #1c2d3e",
        padding: "13px 20px",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        flexWrap: "wrap", gap: 10,
        position: "sticky", top: 0, zIndex: 50,
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 13 }}>
          <div style={{
            width: 40, height: 40, borderRadius: 8,
            background: "linear-gradient(135deg, #00e5ff, #0077ff)",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontWeight: 700, fontSize: 12, color: "#080f17", letterSpacing: 0.5,
          }}>HRM</div>
          <div>
            <div style={{ fontSize: 19, fontWeight: 700, color: "#e8edf3" }}>House Hunt Scorer</div>
            <div style={{ fontSize: 10, color: "#00e5ff", letterSpacing: 2, textTransform: "uppercase" }}>Halifax · Dartmouth Region</div>
          </div>
        </div>
        <div style={{ fontSize: 11, color: "#4a6a84", background: "#0d1c2b", border: "1px solid #1c2d3e", padding: "5px 12px", borderRadius: 20 }}>
          HRM avg sold&nbsp; <strong style={{ color: "#00e5ff" }}>$547K–$600K</strong> &nbsp;(2023–2025)
        </div>
      </header>

      {/* ── BODY ── */}
      <div className="layout">

        {/* ── LEFT: CRITERIA ── */}
        <div className="left-col">

          {/* Property details */}
          <div className="card">
            <div className="card-title">🏡 Property Details</div>
            <div className="row">
              <label>Address</label>
              <input placeholder="e.g. 42 Maple Dr, Dartmouth" value={address} onChange={e => setAddress(e.target.value)} />
            </div>
            <div className="row">
              <label>Listing Price (CAD, optional)</label>
              <input placeholder="e.g. 589000" value={listPrice} onChange={e => setListPrice(e.target.value)} />
            </div>
          </div>

          {/* Criteria dropdowns */}
          {Object.entries(CRITERIA).map(([key, cat]) => (
            <div className="card" key={key}>
              <div className="card-title">
                {cat.icon}&nbsp;{cat.label}
                {scores[key] !== undefined && (
                  <span className="badge" style={{ color: scores[key] > 0 ? "#39ff14" : scores[key] < 0 ? "#ff453a" : "#7a96b0" }}>
                    {scores[key] > 0 ? `+${scores[key]}` : scores[key]}
                  </span>
                )}
              </div>
              <select
                value={scores[key] !== undefined ? String(scores[key]) : "null"}
                onChange={e => handleChange(key, e.target.value)}
              >
                {cat.options.map(opt => (
                  <option key={opt.label} value={String(opt.value)}>
                    {opt.label}{opt.value !== null ? (opt.value > 0 ? `  (+${opt.value})` : opt.value < 0 ? `  (${opt.value})` : "  (0)") : ""}
                  </option>
                ))}
              </select>
            </div>
          ))}

          <button className="save-btn" onClick={handleSave} disabled={!address}>
            💾 Save Property
          </button>
        </div>

        {/* ── RIGHT: SCORE + CHART + OFFER ── */}
        <div className="right-col">

          {/* Tabs */}
          <div className="tab-row">
            <button className={`tab${tab === "score" ? " active" : ""}`} onClick={() => setTab("score")}>📊 Score</button>
            <button className={`tab${tab === "trend" ? " active" : ""}`} onClick={() => setTab("trend")}>📈 Trend</button>
          </div>

          {/* SCORE TAB */}
          {tab === "score" && (
            <>
              <div className="card">
                <div className="card-title">📊 Property Score</div>

                {/* Gauge */}
                <div className="gauge-wrap">
                  <svg width="130" height="130" viewBox="0 0 130 130">
                    <circle cx="65" cy="65" r="52" fill="none" stroke="#1c2d3e" strokeWidth="11" />
                    <circle
                      cx="65" cy="65" r="52" fill="none"
                      stroke={answered === 0 ? "#1c2d3e" : color}
                      strokeWidth="11" strokeLinecap="round"
                      strokeDasharray={`${answered === 0 ? 0 : dash} ${circ}`}
                      transform="rotate(-90 65 65)"
                      style={{ transition: "stroke-dasharray 0.5s ease, stroke 0.3s" }}
                    />
                    <text x="65" y="59" textAnchor="middle" fill={answered === 0 ? "#1c2d3e" : color} fontSize="30" fontWeight="700" fontFamily="JetBrains Mono">
                      {answered === 0 ? "—" : totalScore}
                    </text>
                    <text x="65" y="77" textAnchor="middle" fill="#3a5068" fontSize="10" fontFamily="Space Grotesk">
                      / {MAX_SCORE} pts
                    </text>
                  </svg>
                </div>

                <div style={{ textAlign: "center", fontSize: 13, fontWeight: 600, color: answered === 0 ? "#3a5068" : color, marginBottom: 10 }}>
                  {getLabel(pct, answered, total)}
                </div>

                {/* Mini bars */}
                {answered > 0 && Object.entries(CRITERIA).map(([key, cat]) => {
                  const v = scores[key];
                  if (v === undefined) return null;
                  const maxV = Math.max(...cat.options.filter(o => o.value !== null).map(o => o.value));
                  const barPct = maxV > 0 ? Math.max(0, v / maxV) * 100 : 0;
                  return (
                    <div key={key} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5 }}>
                      <span style={{ fontSize: 12, width: 18 }}>{cat.icon}</span>
                      <div style={{ flex: 1, height: 4, background: "#1c2d3e", borderRadius: 2, overflow: "hidden" }}>
                        <div style={{
                          height: "100%", borderRadius: 2,
                          width: `${barPct}%`,
                          background: v < 0 ? "#ff453a" : v === 0 ? "#3a5068" : color,
                          transition: "width 0.4s ease, background 0.3s",
                        }} />
                      </div>
                      <span style={{
                        fontSize: 10, fontFamily: "JetBrains Mono", fontWeight: 600, width: 26, textAlign: "right",
                        color: v > 0 ? "#39ff14" : v < 0 ? "#ff453a" : "#3a5068",
                      }}>
                        {v > 0 ? `+${v}` : v}
                      </span>
                    </div>
                  );
                })}
              </div>

              {/* Offer */}
              <div className="card">
                <div className="card-title">💰 Suggested Offer</div>
                <div style={{ fontSize: 32, fontWeight: 700, color: "#00e5ff", fontFamily: "JetBrains Mono", marginBottom: 2 }}>
                  {fmtCAD(displayOffer)}
                </div>
                <div style={{ fontSize: 11, color: "#4a6a84", marginBottom: 6 }}>
                  {Math.round(offerPct * 100)}% of market baseline
                </div>

                {entered && (
                  <>
                    <div style={{ height: 1, background: "#1c2d3e", margin: "10px 0" }} />
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 6 }}>
                      <span style={{ color: "#4a6a84" }}>List Price</span>
                      <span style={{ fontFamily: "JetBrains Mono" }}>{fmtCAD(entered)}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12 }}>
                      <span style={{ color: "#4a6a84" }}>Difference</span>
                      <span style={{ fontFamily: "JetBrains Mono", fontWeight: 600, color: adjOffer < entered ? "#39ff14" : "#ff453a" }}>
                        {adjOffer < entered
                          ? `${fmtCAD(entered - adjOffer)} under list`
                          : `${fmtCAD(adjOffer - entered)} over list`}
                      </span>
                    </div>
                  </>
                )}

                <div style={{ fontSize: 10, color: "#3a5068", lineHeight: 1.65, marginTop: 12, borderTop: "1px solid #1c2d3e", paddingTop: 10 }}>
                  Baseline: HRM avg sold 2023–2025 ($547K–$600K). Score adjusts offer ±19%. Not financial advice.
                </div>
                <span className="sources-link" onClick={() => setShowSrc(true)}>📚 View data sources</span>
              </div>

              {/* Saved */}
              {saved.length > 0 && (
                <div className="card">
                  <div className="card-title">🗂 Saved Properties</div>
                  {saved.map((h, i) => (
                    <div className="saved-item" key={i}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div style={{ fontSize: 12, flex: 1, marginRight: 8 }}>{h.address}</div>
                        <div style={{ fontFamily: "JetBrains Mono", fontWeight: 700, color: h.color, fontSize: 16 }}>{h.score}</div>
                      </div>
                      <div style={{ fontSize: 11, color: "#4a6a84", marginTop: 3, display: "flex", flexWrap: "wrap", gap: 5 }}>
                        <span style={{ color: h.color }}>{h.label}</span>
                        <span>·</span>
                        <span>Offer: <strong style={{ color: "#00e5ff" }}>{fmtCAD(h.offer)}</strong></span>
                        {h.list && <><span>·</span><span>List: {fmtCAD(h.list)}</span></>}
                      </div>
                      <div style={{ fontSize: 10, color: "#1c2d3e", marginTop: 3 }}>{h.date}</div>
                    </div>
                  ))}
                </div>
              )}
            </>
          )}

          {/* TREND TAB */}
          {tab === "trend" && (
            <div className="card">
              <div className="card-title">📈 HRM Price Trend  <span style={{ color: "#3a5068", fontWeight: 400, fontSize: 9, textTransform: "none", letterSpacing: 0 }}>Q1 2023 – Q4 2025</span></div>
              <TrendChart />
              <div style={{ fontSize: 10, color: "#3a5068", marginTop: 12, lineHeight: 1.7 }}>
                Quarterly average sold prices by property type, HRM Nova Scotia.<br/>
                Sources: NSAR · RE/MAX · Perkins Real Estate · Statistics Canada.<br/>
                <span style={{ color: "#00e5ff", cursor: "pointer", textDecoration: "underline" }} onClick={() => setShowSrc(true)}>View all sources →</span>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── FOOTER ── */}
      <footer style={{ textAlign: "center", padding: "20px 16px", fontSize: 10, color: "#1c2d3e", borderTop: "1px solid #1c2d3e" }}>
        HRM House Hunt Scorer · Personal use only · Not financial or legal advice
      </footer>

      {/* ── SOURCES MODAL ── */}
      {showSrc && (
        <div className="modal-backdrop" onClick={() => setShowSrc(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>📚 Data Sources — Suggested Offer Price</h3>
            <p>
              <strong style={{ color: "#e8edf3" }}>Baseline price ($547K–$600K):</strong> Derived from the 2-year
              average sold price across HRM (Halifax Regional Municipality), based on data from the Nova Scotia
              Association of Realtors (NSAR) and published market reports.
            </p>
            <p>
              <strong style={{ color: "#e8edf3" }}>2023 avg (all types):</strong> $547,000 — Perkins Real Estate / NSAR year-end 2023.
            </p>
            <p>
              <strong style={{ color: "#e8edf3" }}>2024 avg (single-family):</strong> $605,950 — <a href="https://www.cbmaritimerealty.com/blog/halifax-real-estate-2024-recap-2025-market-outlook/" target="_blank" rel="noreferrer">CB Maritime Realty 2024 Recap</a>.
            </p>
            <p>
              <strong style={{ color: "#e8edf3" }}>2024 avg (all types):</strong> $579,606 — <a href="https://halifaxpartnership.com/research-strategy/halifax-index/real-estate/" target="_blank" rel="noreferrer">Halifax Partnership Index 2024</a>.
            </p>
            <p>
              <strong style={{ color: "#e8edf3" }}>2025 avg (all types):</strong> $600,008 — <a href="https://blog.remax.ca/halifax-housing-market-outlook/" target="_blank" rel="noreferrer">RE/MAX Halifax Market Outlook 2026</a>.
            </p>
            <p>
              <strong style={{ color: "#e8edf3" }}>Semi-detached pricing (~$500K range):</strong> RE/MAX 2026 Outlook — first-time buyers segment.
            </p>
            <p>
              <strong style={{ color: "#e8edf3" }}>Offer adjustment logic:</strong> Score is normalized between the minimum and maximum possible point totals. A score at the bottom of the range produces an offer at 83% of market value; a perfect score produces an offer at 102%, reflecting competitive conditions in HRM's seller's market.
            </p>
            <button className="modal-close" onClick={() => setShowSrc(false)}>Close</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
