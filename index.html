<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── COMP ANCHOR TABLE (HRM-wide by house type, location dimension removed) ──
// Now that location is replaced by commute scoring, we use HRM-wide
// averages by property type as the baseline. These come from NSAR 2024/2025
// sold data. [low, mid, high] represents the typical HRM-wide sold range.
// Sources: CB Maritime Realty 2024 Recap, NSAR, Perkins Real Estate.
const COMP_ANCHORS = {
  bungalow:     [510000, 568000, 645000],  // HRM bungalow sold range 2024-2025
  singleFamily: [548000, 606000, 690000],  // HRM single-family avg $605,950 (CB Maritime)
  splitLevel:   [490000, 548000, 625000],  // slightly below single-family
  semiAttached: [445000, 498000, 565000],  // RE/MAX 2026 outlook semi-detached range
};

const TYPE_TO_COMP = {
  10: "bungalow",
  8:  "singleFamily",
  5:  "splitLevel",
  "-5": "semiAttached",
};

// ─── COMMUTE DISTANCE SCORING ─────────────────────────────────────────────────
// Defined breakpoints from Jason's algorithm. Between breakpoints we interpolate
// linearly so the score transitions smoothly rather than jumping in steps.
// Beyond 10km the score is capped at -20.
const COMMUTE_BREAKPOINTS = [
  { km: 0,  pts: 10  },
  { km: 1,  pts: 10  },
  { km: 2,  pts: 7   },
  { km: 3,  pts: 0   },
  { km: 5,  pts: -3  },
  { km: 7,  pts: -10 },
  { km: 10, pts: -20 },
];

function getCommuteScore(km) {
  // Below 1km: perfect score
  if (km <= 1) return 10;
  // Beyond 10km: capped at worst tier
  if (km >= 10) return -20;
  // Linear interpolation between the two surrounding breakpoints
  for (let i = 0; i < COMMUTE_BREAKPOINTS.length - 1; i++) {
    const a = COMMUTE_BREAKPOINTS[i];
    const b = COMMUTE_BREAKPOINTS[i + 1];
    if (km >= a.km && km <= b.km) {
      const t = (km - a.km) / (b.km - a.km); // 0→1 within this segment
      return Math.round(a.pts + t * (b.pts - a.pts));
    }
  }
  return -20;
}

function getCommuteColor(score) {
  if (score >= 7)  return "#39ff14";
  if (score >= 0)  return "#00e5ff";
  if (score >= -5) return "#ff9f0a";
  return "#ff453a";
}

// ─── SCORING CRITERIA (location field removed) ────────────────────────────────
const CRITERIA = {
  houseType: { label:"House Type", icon:"🏘️", options:[
    {label:"Select…",value:null},
    {label:"Bungalow",value:10},
    {label:"Single Family",value:8},
    {label:"Split Level",value:5},
    {label:"Semi-attached",value:-5},
  ]},
  orientation: { label:"Orientation", icon:"🧭", options:[
    {label:"Select…",value:null},
    {label:"South-facing",value:10},
    {label:"East-facing",value:5},
    {label:"West-facing",value:5},
    {label:"North-facing",value:-5},
  ]},
  power: { label:"Power Source", icon:"⚡", options:[
    {label:"Select…",value:null},
    {label:"Dual: Electricity & Propane",value:10},
    {label:"Dual: Electricity & Oil",value:7},
    {label:"Oil only",value:5},
    {label:"Solely Electricity",value:0},
  ]},
  heating: { label:"Heating", icon:"🔥", options:[
    {label:"Select…",value:null},
    {label:"Electricity + Propane Fireplace",value:10},
    {label:"Electricity + Heat Pump",value:7},
    {label:"Electricity only",value:0},
  ]},
  homeAge: { label:"Year Built", icon:"📅", options:[
    {label:"Select…",value:null},
    {label:"2010 or newer",value:10},
    {label:"2000 – 2009",value:7},
    {label:"1990 – 1999",value:5},
    {label:"1980 – 1989",value:2},
    {label:"Before 1980",value:-3},
  ]},
  condition: { label:"Overall Condition", icon:"🔍", options:[
    {label:"Select…",value:null},
    {label:"Move-in ready / renovated",value:10},
    {label:"Good — minor cosmetic only",value:6},
    {label:"Fair — some updating needed",value:2},
    {label:"Poor — major work required",value:-8},
  ]},
  driveway: { label:"Driveway", icon:"🚗", options:[
    {label:"Select…",value:null},
    {label:"Paved",value:10},
    {label:"Pavers",value:7},
    {label:"Gravelled",value:5},
  ]},
  garage: { label:"Garage", icon:"🏠", options:[
    {label:"Select…",value:null},
    {label:"Double Attached",value:10},
    {label:"Double",value:8},
    {label:"Single Attached",value:5},
    {label:"Single",value:3},
  ]},
  fence: { label:"Fence", icon:"🌿", options:[
    {label:"Select…",value:null},
    {label:"Wood Fence",value:7},
    {label:"Chain Link",value:3},
    {label:"No Fence",value:-5},
  ]},
  roof: { label:"Roof Last Updated", icon:"🏗️", options:[
    {label:"Select…",value:null},
    {label:"Within 1 year",value:10},
    {label:"Within 5 years",value:7},
    {label:"Within 8 years",value:5},
    {label:"Around 10 years",value:1},
  ]},
  fireplace: { label:"Fireplace", icon:"🕯️", options:[
    {label:"Select…",value:null},
    {label:"Propane Fireplace",value:5},
    {label:"Conventional",value:3},
    {label:"Electric",value:3},
    {label:"None",value:-5},
  ]},
};

// Max score now includes commute: criteria max (82) + commute max (10) = 92
// Min score: criteria min (-36) + commute min (-20) = -56
const CRITERIA_MAX = 82;
const CRITERIA_MIN = -36;
const COMMUTE_MAX  = 10;
const COMMUTE_MIN  = -20;
const TOTAL_MAX    = CRITERIA_MAX + COMMUTE_MAX;
const TOTAL_MIN    = CRITERIA_MIN + COMMUTE_MIN;

const HRM_AVG_DOM = 30;

function getDomInfo(dom) {
  if (!dom || dom <= HRM_AVG_DOM) return {pct:0,label:"Within market average",color:"#39ff14",tier:"normal"};
  if (dom <= 60)  return {pct:0.015,label:"Slightly above avg — mild discount",color:"#00e5ff",tier:"mild"};
  if (dom <= 90)  return {pct:0.030,label:"2× market average — moderate discount",color:"#ff9f0a",tier:"moderate"};
  if (dom <= 120) return {pct:0.050,label:"4× market average — buyers have passed",color:"#ff6030",tier:"high"};
  return               {pct:0.080,label:"Significant market rejection signal",color:"#ff453a",tier:"severe"};
}

const fmtCAD  = n => "$" + Math.round(n).toLocaleString("en-CA");
const fmtKCAD = n => "$" + Math.round(n/1000) + "K";

function getScoreColor(p) {
  if (p >= 75) return "#39ff14";
  if (p >= 55) return "#00e5ff";
  if (p >= 35) return "#ff9f0a";
  return "#ff453a";
}
function getScoreLabel(p, answered, total) {
  if (answered < total) return answered + " of " + total + " fields filled";
  if (p >= 75) return "Excellent Match ✦";
  if (p >= 55) return "Good Match";
  if (p >= 35) return "Fair Match";
  return "Below Average";
}

// ─── TREND DATA ───────────────────────────────────────────────────────────────
const QUARTERS = ["Q1'23","Q2'23","Q3'23","Q4'23","Q1'24","Q2'24","Q3'24","Q4'24","Q1'25","Q2'25","Q3'25","Q4'25"];
const TREND_DATA = {
  "Single Family":[542000,575000,560000,548000,565000,607000,583000,606000,612000,620000,628000,633000],
  "Bungalow":     [510000,538000,525000,515000,530000,568000,546000,568000,575000,582000,589000,594000],
  "Split Level":  [490000,518000,505000,496000,512000,548000,527000,548000,555000,562000,569000,574000],
  "Semi-attached":[445000,472000,460000,451000,465000,498000,479000,498000,504000,511000,518000,522000],
};
const TREND_COLORS = {"Single Family":"#00e5ff","Bungalow":"#39ff14","Split Level":"#ff9f0a","Semi-attached":"#bf5af2"};

function TrendChart() {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ref.current, {
      type:"line",
      data:{
        labels:QUARTERS,
        datasets:Object.entries(TREND_DATA).map(([label,data])=>({
          label,data,borderColor:TREND_COLORS[label],backgroundColor:TREND_COLORS[label]+"15",
          borderWidth:2.5,pointRadius:3,pointHoverRadius:6,tension:0.35,fill:false,
        })),
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:"index",intersect:false},
        plugins:{
          legend:{position:"bottom",labels:{color:"#7a96b0",font:{family:"Space Grotesk",size:10},boxWidth:10,padding:10}},
          tooltip:{backgroundColor:"#0d1c2b",borderColor:"#1c2d3e",borderWidth:1,titleColor:"#00e5ff",bodyColor:"#e8edf3",
            callbacks:{label:ctx=>" "+ctx.dataset.label+": "+fmtCAD(ctx.raw)}},
        },
        scales:{
          x:{grid:{color:"#1c2d3e"},ticks:{color:"#3a5068",font:{family:"Space Grotesk",size:9}}},
          y:{grid:{color:"#1c2d3e"},min:400000,max:700000,
            ticks:{color:"#3a5068",font:{family:"Space Grotesk",size:9},callback:v=>"$"+(v/1000).toFixed(0)+"K"}},
        },
      },
    });
    return ()=>{ if(chartRef.current) chartRef.current.destroy(); };
  },[]);
  return React.createElement("div",{style:{height:230}},React.createElement("canvas",{ref}));
}

// ─── GOOGLE MAPS LOADER ───────────────────────────────────────────────────────
// We load the Maps JS API dynamically only when the user provides a key.
// This avoids errors on page load and makes the key requirement explicit.
let mapsLoaded = false;
let mapsLoadPromise = null;

function loadMapsAPI(apiKey) {
  if (mapsLoaded) return Promise.resolve();
  if (mapsLoadPromise) return mapsLoadPromise;

  mapsLoadPromise = new Promise((resolve, reject) => {
    // Remove any previous failed script tags
    const old = document.getElementById("gmaps-script");
    if (old) old.remove();

    const script = document.createElement("script");
    script.id = "gmaps-script";
    script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=places`;
    script.async = true;
    script.onload  = () => { mapsLoaded = true; resolve(); };
    script.onerror = () => {
      mapsLoadPromise = null;
      reject(new Error("Failed to load Google Maps. Check your API key."));
    };
    document.head.appendChild(script);
  });
  return mapsLoadPromise;
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  // ── API key state ──
  const [apiKey,      setApiKey]      = useState("");
  const [apiKeyInput, setApiKeyInput] = useState("");
  const [apiReady,    setApiReady]    = useState(false);
  const [apiError,    setApiError]    = useState("");

  // ── Property details ──
  const [address,   setAddress]   = useState("");
  const [listPrice, setListPrice] = useState("");
  const [dom,       setDom]       = useState("");

  // ── Commute ──
  const [commuteAddr,    setCommuteAddr]    = useState("");  // the destination (work/school)
  const [commuteKm,      setCommuteKm]      = useState(null); // resolved driving distance in km
  const [commuteDur,     setCommuteDur]     = useState(null); // driving duration text
  const [commuteLoading, setCommuteLoading] = useState(false);
  const [commuteError,   setCommuteError]   = useState("");

  // ── Scoring criteria ──
  const [scores, setScores] = useState({});

  // ── UI ──
  const [tab,      setTab]      = useState("score");
  const [showSrc,  setShowSrc]  = useState(false);
  const [showCalc, setShowCalc] = useState(false);
  const [showApiHelp, setShowApiHelp] = useState(false);
  const [saved,    setSaved]    = useState([]);

  // ── Activate API key ──────────────────────────────────────────────────────
  async function handleActivateKey() {
    setApiError("");
    if (!apiKeyInput.trim()) return;
    try {
      await loadMapsAPI(apiKeyInput.trim());
      setApiKey(apiKeyInput.trim());
      setApiReady(true);
    } catch(e) {
      setApiError("Could not load Maps API — double-check the key and ensure the Maps JavaScript API is enabled in Google Cloud Console.");
      mapsLoaded = false; mapsLoadPromise = null;
    }
  }

  // ── Commute distance lookup ───────────────────────────────────────────────
  // Uses the Google Maps DistanceMatrixService (browser-side, no server needed).
  // We need both the property address AND the work address for this to work.
  async function handleCommuteCalc() {
    if (!address.trim() || !commuteAddr.trim()) {
      setCommuteError("Enter both the property address and the commute destination.");
      return;
    }
    if (!apiReady) {
      setCommuteError("Activate your Google Maps API key first.");
      return;
    }

    setCommuteLoading(true);
    setCommuteError("");
    setCommuteKm(null);
    setCommuteDur(null);

    try {
      // DistanceMatrixService is part of the Maps JS API we loaded
      const service = new window.google.maps.DistanceMatrixService();

      service.getDistanceMatrix(
        {
          origins:      [address.trim() + ", Halifax, NS, Canada"],
          destinations: [commuteAddr.trim() + ", Halifax, NS, Canada"],
          travelMode:   window.google.maps.TravelMode.DRIVING,
          unitSystem:   window.google.maps.UnitSystem.METRIC,
        },
        (response, status) => {
          setCommuteLoading(false);
          if (status !== "OK") {
            setCommuteError("Google Maps returned status: " + status + ". Check that both addresses are valid.");
            return;
          }

          const element = response.rows[0].elements[0];
          if (element.status !== "OK") {
            setCommuteError("Could not calculate route between these addresses. Try adding 'Dartmouth NS' or 'Halifax NS' to the addresses.");
            return;
          }

          // distance.value is in metres; convert to km
          const km = element.distance.value / 1000;
          setCommuteKm(Math.round(km * 10) / 10);  // 1 decimal place
          setCommuteDur(element.duration.text);
        }
      );
    } catch(e) {
      setCommuteLoading(false);
      setCommuteError("Error: " + e.message);
    }
  }

  // ── Derived score values ──────────────────────────────────────────────────
  const criteriaScore = Object.values(scores).reduce((s,v)=>s+v,0);
  const commuteScore  = commuteKm !== null ? getCommuteScore(commuteKm) : null;
  // Total score includes commute if calculated, otherwise just criteria
  const totalScore    = criteriaScore + (commuteScore !== null ? commuteScore : 0);

  // Answered count: criteria fields + commute (if resolved)
  const criteriaAnswered = Object.keys(scores).length;
  const criteriaTotal    = Object.keys(CRITERIA).length;
  const totalAnswered    = criteriaAnswered + (commuteScore !== null ? 1 : 0);
  const totalFields      = criteriaTotal + 1; // +1 for commute

  // Normalize against total possible range
  const norm      = Math.max(0, Math.min(1, (totalScore - TOTAL_MIN) / (TOTAL_MAX - TOTAL_MIN)));
  const scorePct  = norm * 100;
  const scoreColor = getScoreColor(scorePct);

  // Score multiplier: ±12% around comp anchor
  const scoreMult = 0.88 + norm * 0.24;

  const listNum = parseFloat((listPrice||"").replace(/[,$]/g,""))||null;
  const domNum  = parseInt(dom)||null;

  // ── Comp anchor lookup (type-only, no location) ───────────────────────────
  const typeCompKey = scores.houseType !== undefined ? TYPE_TO_COMP[String(scores.houseType)] : null;
  const compData    = typeCompKey ? COMP_ANCHORS[typeCompKey] : null;
  const compLow     = compData ? compData[0] : null;
  const compMid     = compData ? compData[1] : null;
  const compHigh    = compData ? compData[2] : null;

  // ── Baseline determination ────────────────────────────────────────────────
  let baseline, baselineLabel, baselineTier;
  if (compMid && listNum) {
    baseline = compMid * 0.6 + listNum * 0.4;
    baselineLabel = "Blended: 60% HRM type-comp ("+fmtCAD(compMid)+") + 40% list ("+fmtCAD(listNum)+")";
    baselineTier = "comp+list";
  } else if (compMid) {
    baseline = compMid;
    baselineLabel = "HRM comp anchor for this property type (2024–2025 sold data)";
    baselineTier = "comp";
  } else if (listNum) {
    baseline = listNum;
    baselineLabel = "Listing price only — select House Type for type-specific comp anchor";
    baselineTier = "list";
  } else {
    baseline = 580000;
    baselineLabel = "HRM 2-year average fallback — select House Type for real accuracy";
    baselineTier = "fallback";
  }

  const domInfo    = getDomInfo(domNum);
  const domPenalty = baseline * domInfo.pct;
  const afterScore = baseline * scoreMult;
  const finalOffer = Math.round((afterScore - domPenalty) / 1000) * 1000;
  const gapVsList  = listNum ? (finalOffer - listNum) : null;

  const circ = 2 * Math.PI * 52;
  const dash = (Math.min(100, scorePct) / 100) * circ;

  function handleSelect(key, rawVal) {
    const val = rawVal === "null" ? null : Number(rawVal);
    if (val === null) { setScores(p=>{ const n={...p}; delete n[key]; return n; }); }
    else              { setScores(p=>({...p,[key]:val})); }
  }

  function handleSave() {
    if (!address) return;
    setSaved(prev=>[{
      address, score:totalScore, pct:Math.round(scorePct), offer:finalOffer,
      list:listNum, dom:domNum, commuteKm, commuteDur, commuteScore,
      compRange: compData ? fmtKCAD(compData[0])+"–"+fmtKCAD(compData[2]) : null,
      label:getScoreLabel(scorePct, totalAnswered, totalFields),
      color:scoreColor, date:new Date().toLocaleDateString("en-CA"),
    },...prev]);
    setAddress(""); setListPrice(""); setDom("");
    setCommuteKm(null); setCommuteDur(null); setCommuteError("");
    setScores({});
  }

  // ── Render ────────────────────────────────────────────────────────────────
  return (
    <div>
      {/* HEADER */}
      <header style={{background:"linear-gradient(135deg,#0d1c2b,#080f17)",borderBottom:"1px solid #1c2d3e",
        padding:"13px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",
        flexWrap:"wrap",gap:10,position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:13}}>
          <div style={{width:40,height:40,borderRadius:8,background:"linear-gradient(135deg,#00e5ff,#0077ff)",
            display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:12,color:"#080f17"}}>HRM</div>
          <div>
            <div style={{fontSize:18,fontWeight:700}}>House Hunt Scorer</div>
            <div style={{fontSize:10,color:"#00e5ff",letterSpacing:2,textTransform:"uppercase"}}>Halifax · Dartmouth Region</div>
          </div>
        </div>
        <div style={{fontSize:11,color:"#4a6a84",background:"#0d1c2b",border:"1px solid #1c2d3e",padding:"5px 13px",borderRadius:20}}>
          HRM avg&nbsp;<strong style={{color:"#00e5ff"}}>$573K–$600K</strong>&nbsp;·&nbsp;DOM&nbsp;<strong style={{color:"#ff9f0a"}}>28–31 days</strong>
        </div>
      </header>

      <div className="layout">

        {/* ════════════════ LEFT COLUMN ════════════════ */}
        <div className="left-col">

          {/* ── GOOGLE MAPS API KEY SETUP ── */}
          {/* This is a one-time setup step. The key is used only to call
              Google's own Distance Matrix API — it never leaves the browser. */}
          <div className="api-setup">
            <div className="api-label">🗺 Google Maps API Key — Required for Commute Distance</div>
            {!apiReady ? (
              <>
                <div className="api-input-row">
                  <input
                    type="password"
                    placeholder="Paste your Google Maps API key here…"
                    value={apiKeyInput}
                    onChange={e=>setApiKeyInput(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&handleActivateKey()}
                  />
                  <button className="api-btn" onClick={handleActivateKey}>Activate</button>
                </div>
                <div style={{fontSize:10,color:"#3a5068",marginTop:7,lineHeight:1.6}}>
                  Your key is used only to call Google Maps from your browser — it is not stored anywhere.{" "}
                  <button className="link-btn" onClick={()=>setShowApiHelp(true)}>How to get a free key →</button>
                </div>
                {apiError&&<div className="danger-box" style={{marginTop:8}}>{apiError}</div>}
              </>
            ) : (
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:"#39ff14",boxShadow:"0 0 6px #39ff14"}}/>
                <span style={{fontSize:12,color:"#39ff14"}}>Google Maps ready — commute calculation enabled</span>
                <button className="link-btn" style={{marginLeft:"auto"}} onClick={()=>{
                  setApiReady(false); setApiKey(""); setApiKeyInput(""); mapsLoaded=false; mapsLoadPromise=null;
                }}>Change key</button>
              </div>
            )}
          </div>

          {/* ── PROPERTY DETAILS ── */}
          <div className="card">
            <div className="card-title">🏡 Property Details</div>
            <div className="row">
              <label>Property Address</label>
              <input type="text" placeholder="e.g. 107 Lancaster Drive, Dartmouth NS" value={address} onChange={e=>setAddress(e.target.value)}/>
            </div>
            <div className="grid2">
              <div className="row" style={{marginBottom:0}}>
                <label>Listing Price (CAD)</label>
                <input type="text" placeholder="e.g. 720000" value={listPrice} onChange={e=>setListPrice(e.target.value)}/>
              </div>
              <div className="row" style={{marginBottom:0}}>
                <label>Days on Market ⚠️</label>
                <input type="number" min="0" placeholder="e.g. 90" value={dom} onChange={e=>setDom(e.target.value)}/>
              </div>
            </div>

            {/* DOM feedback */}
            {domNum > 0 && (()=>{
              const info = getDomInfo(domNum);
              const cls = info.tier==="normal"?"good-box":info.tier==="mild"?"info-box":info.tier==="moderate"?"warn-box":"danger-box";
              return <div className={cls} style={{marginTop:8}}>
                <strong style={{color:info.color}}>DOM: {domNum} days</strong> — {info.label}. HRM avg is {HRM_AVG_DOM} days.
                {info.pct>0&&" Applying a "+(info.pct*100).toFixed(1)+"% offer discount."}
              </div>;
            })()}

            {/* Comp anchor banner */}
            {compData ? (
              <div className="comp-banner">
                <div className="comp-label">📊 HRM Comp Range for This Type</div>
                <div className="comp-range">{fmtKCAD(compLow)} – {fmtKCAD(compHigh)}</div>
                <div className="comp-sub">
                  Typical HRM sold price for a <strong style={{color:"#e8edf3"}}>{typeCompKey&&typeCompKey.replace(/([A-Z])/g,' $1').trim()}</strong> (2024–2025 NSAR data).
                  Midpoint baseline: <strong style={{color:"#00e5ff"}}>{fmtCAD(compMid)}</strong>.
                  {listNum&&<> List price blended in at 40%.</>}
                </div>
              </div>
            ) : (
              <div className="warn-box" style={{marginTop:10}}>
                Select <strong>House Type</strong> below to load the HRM comp range for this property type.
              </div>
            )}
          </div>

          {/* ── COMMUTE DISTANCE CARD ── */}
          {/* This replaces the Location dropdown. Instead of manually scoring
              proximity, we let Google Maps calculate the actual driving distance
              and score it objectively against Jason's defined thresholds. */}
          <div className="card">
            <div className="card-title">
              🚦 Commute Distance
              {commuteScore!==null&&(
                <span className="ml" style={{color:getCommuteColor(commuteScore)}}>
                  {commuteScore>0?"+"+commuteScore:commuteScore}
                </span>
              )}
            </div>

            <div className="row">
              <label>Work / School / Daily Destination</label>
              <input
                type="text"
                placeholder="e.g. 1505 Barrington St, Halifax NS"
                value={commuteAddr}
                onChange={e=>{ setCommuteAddr(e.target.value); setCommuteKm(null); setCommuteDur(null); }}
              />
            </div>

            <button
              className={"calc-btn"+(commuteLoading?" loading":"")}
              onClick={handleCommuteCalc}
              disabled={!address.trim()||!commuteAddr.trim()||!apiReady||commuteLoading}
            >
              {commuteLoading ? "⏳ Calculating…" : !apiReady ? "🔑 Activate API key above first" : "🗺 Calculate Commute Distance"}
            </button>

            {commuteError&&<div className="danger-box" style={{marginTop:8}}>{commuteError}</div>}

            {/* Result display */}
            {commuteKm!==null&&(()=>{
              const score = getCommuteScore(commuteKm);
              const color = getCommuteColor(score);
              return (
                <div className="commute-result" style={{marginTop:10,borderColor:color+"44"}}>
                  <div>
                    <div className="commute-dist" style={{color}}>{commuteKm} km</div>
                    <div style={{fontSize:10,color:"#4a6a84",marginTop:2}}>driving</div>
                  </div>
                  <div className="commute-meta">
                    <div className="c-label">Drive time: <strong style={{color:"#e8edf3"}}>{commuteDur}</strong></div>
                    <div className="c-score" style={{color,marginTop:4}}>
                      Commute score: {score>0?"+"+score:score} pts
                    </div>
                    <div style={{fontSize:10,color:"#3a5068",marginTop:2}}>
                      {commuteKm<=1?"Excellent — within walking distance":
                       commuteKm<=2?"Very close — minimal commute impact":
                       commuteKm<=3?"Reasonable commute":
                       commuteKm<=5?"Moderate commute — slight penalty":
                       commuteKm<=7?"Significant commute":
                       commuteKm<=10?"Long daily drive":"Extended commute — major penalty"}
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* Scoring legend */}
            <div style={{marginTop:12,fontSize:10,color:"#3a5068"}}>
              Scoring scale: 1km (+10) → 2km (+7) → 3km (0) → 5km (−3) → 7km (−10) → 10km+ (−20).
              Interpolated linearly between thresholds.
            </div>
          </div>

          {/* ── SCORING CRITERIA ── */}
          {Object.entries(CRITERIA).map(([key,cat])=>(
            <div className="card" key={key}>
              <div className="card-title">
                {cat.icon}&nbsp;{cat.label}
                {scores[key]!==undefined&&(
                  <span className="ml" style={{color:scores[key]>0?"#39ff14":scores[key]<0?"#ff453a":"#7a96b0"}}>
                    {scores[key]>0?"+"+scores[key]:scores[key]}
                  </span>
                )}
              </div>
              <select
                value={scores[key]!==undefined?String(scores[key]):"null"}
                onChange={e=>handleSelect(key,e.target.value)}
              >
                {cat.options.map(opt=>(
                  <option key={opt.label} value={String(opt.value)}>
                    {opt.label}{opt.value!==null&&(opt.value>0?"  (+"+opt.value+" pts)":opt.value<0?"  ("+opt.value+" pts)":"  (0 pts)")}
                  </option>
                ))}
              </select>
              {key==="condition"&&scores[key]===-8&&(
                <div className="danger-box" style={{marginTop:8}}>Major work needed — get an inspection estimate before committing to any offer number.</div>
              )}
              {key==="homeAge"&&scores[key]===-3&&(
                <div className="warn-box" style={{marginTop:8}}>Pre-1980 HRM homes often have 60-amp panels, knob-and-tube wiring, or aging plumbing — budget for a professional inspection.</div>
              )}
            </div>
          ))}

          <button className="save-btn" onClick={handleSave} disabled={!address}>💾 Save Property to Comparison</button>
        </div>

        {/* ════════════════ RIGHT COLUMN ════════════════ */}
        <div className="right-col">
          <div className="tab-row">
            <button className={"tab"+(tab==="score"?" active":"")} onClick={()=>setTab("score")}>📊 Score</button>
            <button className={"tab"+(tab==="trend"?" active":"")} onClick={()=>setTab("trend")}>📈 Trend</button>
            <button className={"tab"+(tab==="market"?" active":"")} onClick={()=>setTab("market")}>🏙️ Market</button>
          </div>

          {/* ── SCORE TAB ── */}
          {tab==="score"&&<>
            <div className="card">
              <div className="card-title">📊 Property Score</div>
              <div style={{display:"flex",justifyContent:"center",marginBottom:6}}>
                <svg width="130" height="130" viewBox="0 0 130 130">
                  <circle cx="65" cy="65" r="52" fill="none" stroke="#1c2d3e" strokeWidth="11"/>
                  <circle cx="65" cy="65" r="52" fill="none"
                    stroke={totalAnswered===0?"#1c2d3e":scoreColor} strokeWidth="11" strokeLinecap="round"
                    strokeDasharray={(totalAnswered===0?0:dash)+" "+circ} transform="rotate(-90 65 65)"
                    style={{transition:"stroke-dasharray 0.5s ease, stroke 0.3s"}}/>
                  <text x="65" y="59" textAnchor="middle" fill={totalAnswered===0?"#1c2d3e":scoreColor}
                    fontSize="27" fontWeight="700" fontFamily="JetBrains Mono">
                    {totalAnswered===0?"—":totalScore}
                  </text>
                  <text x="65" y="77" textAnchor="middle" fill="#3a5068" fontSize="10" fontFamily="Space Grotesk">
                    / {TOTAL_MAX} pts
                  </text>
                </svg>
              </div>
              <div style={{textAlign:"center",fontSize:13,fontWeight:600,color:totalAnswered===0?"#3a5068":scoreColor,marginBottom:10}}>
                {getScoreLabel(scorePct,totalAnswered,totalFields)}
              </div>

              {/* Criteria bars */}
              {criteriaAnswered>0&&Object.entries(CRITERIA).map(([key,cat])=>{
                const v=scores[key]; if(v===undefined) return null;
                const maxV=Math.max(...cat.options.filter(o=>o.value!==null).map(o=>o.value));
                const barPct=maxV>0?Math.max(0,v/maxV)*100:0;
                return <div key={key} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                  <span style={{fontSize:12,width:18}}>{cat.icon}</span>
                  <div style={{flex:1,height:4,background:"#1c2d3e",borderRadius:2,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:2,width:barPct+"%",
                      background:v<0?"#ff453a":v===0?"#3a5068":scoreColor,
                      transition:"width 0.4s, background 0.3s"}}/>
                  </div>
                  <span style={{fontSize:10,fontFamily:"JetBrains Mono",fontWeight:600,width:28,textAlign:"right",
                    color:v>0?"#39ff14":v<0?"#ff453a":"#3a5068"}}>{v>0?"+"+v:v}</span>
                </div>;
              })}

              {/* Commute bar */}
              {commuteScore!==null&&(()=>{
                const color=getCommuteColor(commuteScore);
                const maxV=COMMUTE_MAX;
                const barPct=maxV>0?Math.max(0,commuteScore/maxV)*100:0;
                return <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5,
                  borderTop:"1px solid #1c2d3e",paddingTop:6,marginTop:4}}>
                  <span style={{fontSize:12,width:18}}>🚦</span>
                  <div style={{flex:1,height:4,background:"#1c2d3e",borderRadius:2,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:2,width:barPct+"%",
                      background:commuteScore<0?"#ff453a":commuteScore===0?"#3a5068":color,
                      transition:"width 0.4s, background 0.3s"}}/>
                  </div>
                  <span style={{fontSize:10,fontFamily:"JetBrains Mono",fontWeight:600,width:28,textAlign:"right",color}}>
                    {commuteScore>0?"+"+commuteScore:commuteScore}
                  </span>
                </div>;
              })()}
            </div>

            {/* Offer */}
            <div className="card">
              <div className="card-title">💰 Suggested Offer</div>
              <div style={{fontSize:34,fontWeight:700,color:"#00e5ff",fontFamily:"JetBrains Mono",marginBottom:2}}>
                {fmtCAD(finalOffer)}
              </div>
              <div style={{fontSize:11,color:"#4a6a84",marginBottom:10}}>
                Score adj: <strong style={{color:scoreColor}}>{scoreMult>1?"+":""}{((scoreMult-1)*100).toFixed(0)}%</strong> of baseline
                {domInfo.pct>0&&<> · DOM: <strong style={{color:domInfo.color}}>−{(domInfo.pct*100).toFixed(1)}%</strong></>}
              </div>

              {/* Comp range bar */}
              {compData&&(()=>{
                const lo=compData[0],hi=compData[2];
                const outerLo=lo*0.85, outerHi=hi*1.15;
                const span=outerHi-outerLo;
                const pct=p=>Math.max(0,Math.min(100,((p-outerLo)/span)*100));
                return <div style={{marginBottom:12}}>
                  <div style={{fontSize:10,color:"#4a6a84",marginBottom:5}}>Offer vs HRM comp range:</div>
                  <div style={{position:"relative",height:20,background:"#0a1929",borderRadius:6,border:"1px solid #1c2d3e"}}>
                    <div style={{position:"absolute",left:pct(lo)+"%",width:(pct(hi)-pct(lo))+"%",
                      top:0,bottom:0,background:"#00e5ff18",borderLeft:"1px solid #00e5ff44",borderRight:"1px solid #00e5ff44"}}/>
                    <div style={{position:"absolute",left:"calc("+pct(finalOffer)+"% - 6px)",top:"-3px",
                      width:12,height:12,borderRadius:"50%",background:scoreColor,
                      boxShadow:"0 0 8px "+scoreColor+"88",border:"2px solid #080f17"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#3a5068",marginTop:4}}>
                    <span>{fmtKCAD(lo)}</span><span style={{color:"#4a6a84"}}>← comp range →</span><span>{fmtKCAD(hi)}</span>
                  </div>
                </div>;
              })()}

              {gapVsList!==null&&(
                <div className={gapVsList<0?"good-box":"danger-box"} style={{marginBottom:10}}>
                  <strong style={{color:gapVsList<0?"#39ff14":"#ff453a"}}>
                    {fmtCAD(Math.abs(gapVsList))} {gapVsList<0?"below":"above"} list price
                  </strong>
                  {" — "}{gapVsList<0?"Good room for negotiation.":"Comp data suggests this may be underpriced relative to the area."}
                </div>
              )}

              {baselineTier==="fallback"&&(
                <div className="warn-box" style={{marginBottom:10}}>Select House Type to replace the $580K fallback with a real HRM comp anchor.</div>
              )}

              <button className="link-btn" style={{marginBottom:8}} onClick={()=>setShowCalc(!showCalc)}>
                {showCalc?"▲ Hide calculation":"▼ How is this calculated?"}
              </button>
              {showCalc&&<div style={{marginBottom:10}}>
                <div className="step-row"><span className="step-label">Baseline</span><span className="step-value" style={{color:"#e8edf3"}}>{fmtCAD(baseline)}</span></div>
                <div className="step-row"><span className="step-label" style={{fontSize:10,color:"#3a5068"}}>{baselineLabel}</span></div>
                <div className="step-row">
                  <span className="step-label">Score adjustment</span>
                  <span className="step-value" style={{color:scoreColor}}>× {(scoreMult*100).toFixed(0)}%</span>
                  <span className="step-adj">({totalScore} pts → {Math.round(scorePct)}% of range)</span>
                </div>
                <div className="step-row"><span className="step-label">After score</span><span className="step-value" style={{color:"#e8edf3"}}>{fmtCAD(afterScore)}</span></div>
                {domInfo.pct>0&&<div className="step-row">
                  <span className="step-label">DOM penalty ({domNum} days)</span>
                  <span className="step-value" style={{color:domInfo.color}}>− {fmtCAD(domPenalty)}</span>
                  <span className="step-adj">−{(domInfo.pct*100).toFixed(1)}%</span>
                </div>}
                <div className="step-row" style={{borderTop:"1px solid #00e5ff33",paddingTop:6}}>
                  <span className="step-label" style={{color:"#00e5ff",fontWeight:600}}>Final Offer</span>
                  <span className="step-value" style={{color:"#00e5ff",fontSize:14,fontWeight:700}}>{fmtCAD(finalOffer)}</span>
                </div>
              </div>}

              <div style={{fontSize:10,color:"#3a5068",lineHeight:1.65,borderTop:"1px solid #1c2d3e",paddingTop:10,marginTop:4}}>
                Not financial advice. Verify with real sold comps from a licensed REALTOR® or ViewPoint.ca.
                <br/><button className="link-btn" style={{marginTop:4}} onClick={()=>setShowSrc(true)}>📚 View data sources</button>
              </div>
            </div>

            {/* Saved */}
            {saved.length>0&&<div className="card">
              <div className="card-title">🗂 Saved Properties</div>
              {saved.map((h,i)=>(
                <div className="saved-item" key={i}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{fontSize:12,flex:1,marginRight:8}}>{h.address}</div>
                    <div style={{fontFamily:"JetBrains Mono",fontWeight:700,color:h.color,fontSize:16}}>{h.score}</div>
                  </div>
                  <div style={{fontSize:11,color:"#4a6a84",marginTop:3,display:"flex",flexWrap:"wrap",gap:5}}>
                    <span style={{color:h.color}}>{h.label}</span>
                    <span>·</span>
                    <span>Offer: <strong style={{color:"#00e5ff"}}>{fmtCAD(h.offer)}</strong></span>
                    {h.list&&<><span>·</span><span>List: {fmtCAD(h.list)}</span></>}
                    {h.commuteKm&&<><span>·</span><span style={{color:getCommuteColor(h.commuteScore)}}>{h.commuteKm}km commute</span></>}
                    {h.dom&&<><span>·</span><span style={{color:getDomInfo(h.dom).color}}>{h.dom}d DOM</span></>}
                  </div>
                  <div style={{fontSize:10,color:"#1c2d3e",marginTop:3}}>{h.date}</div>
                </div>
              ))}
            </div>}
          </>}

          {/* ── TREND TAB ── */}
          {tab==="trend"&&<div className="card">
            <div className="card-title">📈 HRM Price Trend <span style={{color:"#3a5068",fontWeight:400,fontSize:9,textTransform:"none",letterSpacing:0,marginLeft:4}}>Q1 2023 – Q4 2025</span></div>
            <TrendChart/>
            <div style={{fontSize:10,color:"#3a5068",marginTop:10,lineHeight:1.7}}>
              Quarterly avg sold prices by type, HRM NS. Sources: NSAR · RE/MAX · Perkins Real Estate · Statistics Canada.
              <br/><button className="link-btn" style={{marginTop:4}} onClick={()=>setShowSrc(true)}>View all sources →</button>
            </div>
          </div>}

          {/* ── MARKET TAB ── */}
          {tab==="market"&&<div className="card">
            <div className="card-title">🏙️ HRM Market Context</div>
            {[
              {lbl:"Market type (2025)",          val:"Seller's market",color:"#ff9f0a"},
              {lbl:"Avg sold price (2025)",        val:"$600,008",      color:"#00e5ff"},
              {lbl:"Single family avg (2024)",     val:"$605,950",      color:"#00e5ff"},
              {lbl:"Semi-detached range",          val:"~$490K–$530K",  color:"#bf5af2"},
              {lbl:"Months of supply",             val:"2.2–4.3 months",color:"#ff9f0a"},
              {lbl:"Avg days on market",           val:"28–31 days",    color:"#ff9f0a"},
              {lbl:"List-to-sale ratio (2024)",    val:"~100%",         color:"#39ff14"},
              {lbl:"YoY price growth (2025)",      val:"+4.1%",         color:"#39ff14"},
              {lbl:"2026 forecast",                val:"+3% expected",  color:"#00e5ff"},
              {lbl:"Bedford — over-asking sales",  val:"43%",           color:"#ff9f0a"},
            ].map(r=>(
              <div className="market-stat" key={r.lbl}>
                <span className="lbl">{r.lbl}</span>
                <span className="val" style={{color:r.color}}>{r.val}</span>
              </div>
            ))}
            <div className="warn-box" style={{marginTop:14}}>
              <strong style={{color:"#ff9f0a"}}>Buyer takeaway:</strong> Well-priced homes move in under 31 days. A 90+ day listing almost always signals a pricing or condition issue — use that directly as negotiating leverage.
            </div>
            <div className="info-box" style={{marginTop:8}}>
              <strong style={{color:"#00e5ff"}}>What this model can't see:</strong> Street-level sold comps, lot-specific issues, traffic noise, and your actual mortgage pre-approval rate. Always pair this dashboard with ViewPoint.ca or a local REALTOR®.
            </div>
            <button className="link-btn" style={{marginTop:12}} onClick={()=>setShowSrc(true)}>📚 View all data sources</button>
          </div>}
        </div>
      </div>

      <footer style={{textAlign:"center",padding:"20px 16px",fontSize:10,color:"#1c2d3e",borderTop:"1px solid #1c2d3e"}}>
        HRM House Hunt Scorer · Personal use only · Not financial or legal advice · Data: NSAR, RE/MAX, The Pike Group, Statistics Canada
      </footer>

      {/* ── SOURCES MODAL ── */}
      {showSrc&&<div className="modal-backdrop" onClick={()=>setShowSrc(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <h3>📚 Data Sources</h3>
          <p><strong style={{color:"#e8edf3"}}>HRM comp anchors by type:</strong> Derived from NSAR 2024 sold data, Perkins Real Estate HRM monthly reports, and CB Maritime Realty 2024 Recap. Ranges reflect observed market variance across HRM.</p>
          <p><strong style={{color:"#e8edf3"}}>Single-family avg $605,950 (2024):</strong> <a href="https://www.cbmaritimerealty.com/blog/halifax-real-estate-2024-recap-2025-market-outlook/" target="_blank" rel="noreferrer">CB Maritime Realty 2024 Recap</a>.</p>
          <p><strong style={{color:"#e8edf3"}}>All-types avg $600,008 (2025):</strong> <a href="https://blog.remax.ca/halifax-housing-market-outlook/" target="_blank" rel="noreferrer">RE/MAX Halifax Outlook 2026</a>.</p>
          <p><strong style={{color:"#e8edf3"}}>Months of supply, DOM:</strong> <a href="https://andrewperkins.co/market-trends" target="_blank" rel="noreferrer">Perkins Real Estate — Keller Williams Select Realty</a>.</p>
          <p><strong style={{color:"#e8edf3"}}>Commute distance:</strong> Google Maps Distance Matrix API (live driving distance, not straight-line). Scoring thresholds defined by user.</p>
          <p><strong style={{color:"#e8edf3"}}>DOM penalty:</strong> HRM 28–31 day avg DOM (NSAR 2024). Penalty tiers based on standard negotiation practice.</p>
          <button className="modal-close" onClick={()=>setShowSrc(false)}>Close</button>
        </div>
      </div>}

      {/* ── API KEY HELP MODAL ── */}
      {showApiHelp&&<div className="modal-backdrop" onClick={()=>setShowApiHelp(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <h3>🗺 How to Get a Free Google Maps API Key</h3>
          <p>Google gives $200/month in free API credit — more than enough for personal house hunting use. Here's the process:</p>
          <ol>
            <li>Go to <a href="https://console.cloud.google.com" target="_blank" rel="noreferrer">console.cloud.google.com</a> and sign in with your Google account.</li>
            <li>Create a new project (e.g. "House Hunt Dashboard").</li>
            <li>In the left sidebar, go to <strong style={{color:"#e8edf3"}}>APIs & Services → Library</strong>.</li>
            <li>Search for and enable two APIs: <strong style={{color:"#e8edf3"}}>Maps JavaScript API</strong> and <strong style={{color:"#e8edf3"}}>Distance Matrix API</strong>.</li>
            <li>Go to <strong style={{color:"#e8edf3"}}>APIs & Services → Credentials</strong> and click <strong style={{color:"#e8edf3"}}>Create Credentials → API Key</strong>.</li>
            <li>Copy the key and paste it into the field on this dashboard.</li>
          </ol>
          <p style={{marginTop:8}}><strong style={{color:"#ff9f0a"}}>Optional but recommended:</strong> In the key settings, restrict it to HTTP referrers and add your GitHub Pages URL (e.g. <code style={{color:"#00e5ff"}}>aspduck.github.io/*</code>) so the key only works on your own site.</p>
          <p>Your key is only used to call Google's API from your browser — it never passes through any other server.</p>
          <button className="modal-close" onClick={()=>setShowApiHelp(false)}>Close</button>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
